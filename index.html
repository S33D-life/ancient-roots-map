<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>S33D.life — The Living Atlas of Ancient Friends</title>
    <meta name="description" content="A globally distributed, locally curated living library mapping ancient trees, gathering wisdom, and weaving a planetary tapestry of seeds, stories, and mystery." />
    <meta name="author" content="S33D.life" />

    <!-- PWA meta tags -->
    <meta name="theme-color" content="#1a1f14" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ancient Friends" />
    <link rel="apple-touch-icon" href="/pwa-icon-512.png" />
    <link rel="icon" href="/pwa-icon-192.png" type="image/png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"></noscript>

    <!-- DNS prefetch for map tiles & Supabase -->
    <link rel="dns-prefetch" href="https://mwzcuczfedrjplndggiv.supabase.co">
    <link rel="preconnect" href="https://mwzcuczfedrjplndggiv.supabase.co">

    <!-- Preload LCP image so the browser discovers it before JS executes -->
    <link rel="preload" href="/src/assets/header-moss-wood.jpg" as="image" fetchpriority="high">

    <meta property="og:title" content="S33D.life — The Living Atlas of Ancient Friends" />
    <meta property="og:description" content="A globally distributed, locally curated living library of seeds, stories, and mystery. Map trees, gather wisdom, earn hearts." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ancient-roots-map.lovable.app" />
    <meta property="og:image" content="https://ancient-roots-map.lovable.app/pwa-icon-512.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@s33dlife" />
    <meta name="twitter:title" content="S33D.life — The Living Atlas of Ancient Friends" />
    <meta name="twitter:description" content="Map ancient trees, gather wisdom, earn hearts, join councils." />
    <meta name="twitter:image" content="https://ancient-roots-map.lovable.app/pwa-icon-512.png" />
    <link rel="canonical" href="https://ancient-roots-map.lovable.app" />
  </head>

  <body>
    <div id="root">
      <!-- Inline initial content for fast FCP — replaced once React mounts -->
      <div id="s33d-splash" style="display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;background:#1a1f14;flex-direction:column;gap:1rem">
        <div style="width:48px;height:48px;border-radius:50%;border:2px solid #d4a017;border-top-color:transparent;animation:s33d-spin .8s linear infinite"></div>
        <p style="font-family:Cinzel,serif;color:hsl(45,100%,85%);font-size:14px;letter-spacing:.15em;opacity:.7">Loading Ancient Friends…</p>
      </div>
    </div>
    <style>@keyframes s33d-spin{to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
