<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>S33D.life — Living Atlas of Ancient Trees</title>
    <meta name="description" content="A globally distributed, locally curated living library mapping ancient trees, gathering wisdom, and weaving a planetary tapestry of seeds, stories, and mystery." />
    <meta name="author" content="S33D.life" />

    <!-- PWA meta tags -->
    <meta name="theme-color" content="#1a1f14" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ancient Friends" />
    <link rel="apple-touch-icon" href="/pwa-icon-512.png" />
    <link rel="icon" href="/pwa-icon-192.png" type="image/png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap">

    <!-- DNS prefetch for map tiles & Supabase -->
    <link rel="dns-prefetch" href="https://mwzcuczfedrjplndggiv.supabase.co">
    <link rel="preconnect" href="https://mwzcuczfedrjplndggiv.supabase.co">

    <!-- Preload LCP image so the browser discovers it before JS executes -->
    <link rel="preload" href="/src/assets/header-moss-wood.jpg" as="image" fetchpriority="high">

    <!-- Open Graph -->
    <meta property="og:title" content="S33D.life — Living Atlas of Ancient Trees" />
    <meta property="og:description" content="A globally distributed, locally curated living library mapping ancient trees, gathering wisdom, and weaving a planetary tapestry of seeds, stories, and mystery." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.s33d.life/" />
    <meta property="og:image" content="https://www.s33d.life/og/s33d-share-default.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="S33D.life" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@s33dlife" />
    <meta name="twitter:title" content="S33D.life — Living Atlas of Ancient Trees" />
    <meta name="twitter:description" content="Map ancient trees, gather wisdom, earn hearts, join councils." />
    <meta name="twitter:image" content="https://www.s33d.life/og/s33d-share-default.jpg" />
    <link rel="canonical" href="https://www.s33d.life/" />

    <!-- Structured data: sitewide Organization + WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://www.s33d.life/#organization",
          "name": "S33D.life",
          "url": "https://www.s33d.life/",
          "logo": "https://www.s33d.life/pwa-icon-512.png",
          "sameAs": ["https://twitter.com/s33dlife"]
        },
        {
          "@type": "WebSite",
          "@id": "https://www.s33d.life/#website",
          "url": "https://www.s33d.life/",
          "name": "S33D.life",
          "description": "Living Atlas of Ancient Trees — a participatory map of the world's ancient friends.",
          "publisher": { "@id": "https://www.s33d.life/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://www.s33d.life/atlas?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root">
      <!-- Inline initial content for fast FCP — replaced once React mounts -->
      <div id="s33d-splash" style="display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;background:#1a1f14;flex-direction:column;gap:1rem">
        <div style="width:48px;height:48px;border-radius:50%;border:2px solid #d4a017;border-top-color:transparent;animation:s33d-spin .8s linear infinite"></div>
        <p style="font-family:Cinzel,serif;color:hsl(45,100%,85%);font-size:14px;letter-spacing:.15em;opacity:.7">Loading Ancient Friends…</p>
      </div>
    </div>
    <style>@keyframes s33d-spin{to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
